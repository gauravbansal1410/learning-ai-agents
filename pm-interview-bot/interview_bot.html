<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Design Interview Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f9f7f4; color: #1a1a1a; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 2rem; font-weight: normal; margin-bottom: 0.5rem; }
    p.sub { color: #666; margin-bottom: 2rem; }

    .screen { display: none; max-width: 680px; margin: 0 auto; }
    .screen.active { display: block; }

    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; letter-spacing: 0.05em; }
    input[type="text"], textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 1rem; font-family: inherit;
      background: #fff; margin-bottom: 1rem;
    }
    textarea { resize: vertical; min-height: 160px; line-height: 1.6; }
    button {
      padding: 10px 22px; border: 1px solid #1a1a1a; border-radius: 6px;
      background: #1a1a1a; color: #fff; font-size: 0.95rem;
      cursor: pointer; font-family: inherit;
    }
    button.secondary { background: #fff; color: #1a1a1a; margin-right: 8px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .question-box {
      background: #fff; border-left: 3px solid #1a1a1a;
      padding: 1rem 1.25rem; margin-bottom: 1.5rem;
      font-size: 1.05rem; line-height: 1.6; border-radius: 0 6px 6px 0;
    }
    .question-box.loading { color: #999; font-style: italic; }

    .nudge-output, .model-answer-box {
      background: #fff; border: 1px solid #ddd; border-radius: 6px;
      padding: 1rem 1.25rem; margin: 1rem 0; line-height: 1.7;
      font-size: 0.95rem; color: #333; display: none;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .col-label { font-size: 0.75rem; letter-spacing: 0.1em; color: #888; margin-bottom: 8px; }
    .summary-output {
      background: #fff; border: 1px solid #ddd; border-radius: 6px;
      padding: 1rem; font-family: monospace; font-size: 0.85rem;
      white-space: pre-wrap; line-height: 1.6; display: none; margin: 1rem 0;
    }
    .key-hint { font-size: 0.8rem; color: #999; margin-top: -0.75rem; margin-bottom: 1rem; }
    .error-msg { color: #c0392b; font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <!-- SCREEN 1: LANDING -->
  <div class="screen active" id="screen-landing">
    <h1>PM design interview bot</h1>
    <p class="sub">Practice product design questions. Get nudges. Compare with model answers.</p>

    <button id="start-btn" onclick="goToPractice()">Start session &rarr;</button>
    <p class="error-msg" id="start-error"></p>
  </div>

  <!-- SCREEN 2: PRACTICE -->
  <div class="screen" id="screen-practice">
    <h1>Your question</h1>
    <p class="sub" id="session-meta">Session &mdash; loading...</p>

    <div class="question-box loading" id="question-text">
      Generating your question...
    </div>

    <label for="user-notes">Your thinking (rough notes are fine)</label>
    <textarea id="user-notes" placeholder="Start with: who is the user? what problem are we solving? what would you build?"></textarea>

    <div class="nudge-output" id="nudge-output"></div>

    <button class="secondary" onclick="getNudge()">Get nudge</button>
    <button onclick="goToDebrief()">I'm done &rarr;</button>
  </div>

  <!-- SCREEN 3: DEBRIEF -->
  <div class="screen" id="screen-debrief">
    <h1>Debrief</h1>
    <p class="sub">Compare your thinking with the model answer.</p>

    <div class="two-col">
      <div>
        <p class="col-label">YOUR NOTES</p>
        <div class="nudge-output" id="your-notes-display" style="display:block;"></div>
      </div>
      <div>
        <p class="col-label">MODEL ANSWER</p>
        <div class="model-answer-box" id="model-answer-box" style="display:block;">Loading model answer...</div>
      </div>
    </div>

    <label for="reflection">What did you miss or want to remember?</label>
    <textarea id="reflection" placeholder="e.g. forgot to define success metrics, didn't think about edge cases..." style="min-height:80px;"></textarea>

    <button class="secondary" onclick="generateSummary()">Generate GitHub summary</button>
    <button onclick="copySummary()">Copy to clipboard</button>
    <button class="secondary" onclick="goToLanding()" style="margin-left:8px;">New question</button>

    <div class="summary-output" id="summary-output"></div>
  </div>

  <script>

    // --- NAVIGATION ---
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function goToLanding() { showScreen('screen-landing'); }

    // --- WEBHOOK CONFIG ---
    const WEBHOOK_URL = 'http://gaurav-n8n.duckdns.org:5678/webhook/pm-interview-question';

    // --- QUESTION GENERATOR (calls n8n, not Gemini directly) ---
    async function goToPractice() {
      const errorEl = document.getElementById('start-error');
      const btn = document.getElementById('start-btn');

      btn.disabled = true;
      btn.textContent = 'Loading...';
      errorEl.textContent = '';

      // Set session date
      document.getElementById('session-meta').textContent =
        'Session — ' + new Date().toISOString().split('T')[0];

      // Switch to practice screen immediately (shows "Generating..." while call runs)
      showScreen('screen-practice');

      try {
        const response = await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({})
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || 'Could not generate question. Try again.');
        }

        // Display question
        const qBox = document.getElementById('question-text');
        qBox.textContent = data.question;
        qBox.classList.remove('loading');

      } catch (err) {
        showScreen('screen-landing');
        errorEl.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Start session \u2192';
      }
    }

    function goToDebrief() {
      const notes = document.getElementById('user-notes').value.trim();
      if (!notes) { alert('Add some notes before moving on.'); return; }
      document.getElementById('your-notes-display').textContent = notes;
      document.getElementById('model-answer-box').textContent = '(Model answer will load here in Step 4)';
      showScreen('screen-debrief');
    }

    // --- PLACEHOLDERS (replaced in later steps) ---
    function getNudge() {
      document.getElementById('nudge-output').style.display = 'block';
      document.getElementById('nudge-output').textContent = '(Nudge will come from Gemini in Step 3)';
    }

    function generateSummary() {
      const summary = '## PM Design Interview — ' + new Date().toISOString().split('T')[0] + '\n\n' +
        '**Question:** ' + document.getElementById('question-text').textContent + '\n\n' +
        '**My notes:** ' + document.getElementById('user-notes').value + '\n\n' +
        '**What I missed:** ' + document.getElementById('reflection').value + '\n\n' +
        '*(Summary generation via Gemini coming in Step 5)*';
      const box = document.getElementById('summary-output');
      box.textContent = summary;
      box.style.display = 'block';
    }

    function copySummary() {
      const text = document.getElementById('summary-output').textContent;
      if (!text) { alert('Generate the summary first.'); return; }
      navigator.clipboard.writeText(text).then(() => alert('Copied to clipboard!'));
    }

    // --- SESSION INIT ---
    window.onload = function() {
      // Nothing to restore — no credentials stored in browser
    };

  </script>

</body>
</html>
