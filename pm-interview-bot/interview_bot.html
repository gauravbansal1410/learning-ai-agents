<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Design Interview Bot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #f9f7f4; color: #1a1a1a; min-height: 100vh; padding: 2rem; }
    h1 { font-size: 2rem; font-weight: normal; margin-bottom: 0.5rem; }
    p.sub { color: #666; margin-bottom: 2rem; }

    .screen { display: none; max-width: 680px; margin: 0 auto; }
    .screen.active { display: block; }

    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; letter-spacing: 0.05em; }
    textarea {
      width: 100%; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 1rem; font-family: inherit;
      background: #fff; margin-bottom: 1rem; resize: vertical; line-height: 1.6;
    }
    button {
      padding: 10px 22px; border: 1px solid #1a1a1a; border-radius: 6px;
      background: #1a1a1a; color: #fff; font-size: 0.95rem;
      cursor: pointer; font-family: inherit;
    }
    button.secondary { background: #fff; color: #1a1a1a; margin-right: 8px; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .question-box {
      background: #fff; border-left: 3px solid #1a1a1a;
      padding: 1rem 1.25rem; margin-bottom: 1.5rem;
      font-size: 1.05rem; line-height: 1.6; border-radius: 0 6px 6px 0;
    }
    .question-box.loading { color: #999; font-style: italic; }

    .nudge-output, .answer-box, .notes-box {
      background: #fff; border: 1px solid #ddd; border-radius: 6px;
      padding: 1rem 1.25rem; margin: 0.5rem 0 1rem; line-height: 1.7;
      font-size: 0.95rem; color: #333;
    }
    .nudge-output { display: none; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .col-label { font-size: 0.75rem; letter-spacing: 0.1em; color: #888; margin-bottom: 8px; }
    .error-msg { color: #c0392b; font-size: 0.9rem; margin-top: 0.75rem; display: block; }
    .success-msg { color: #27ae60; font-size: 0.9rem; margin-top: 0.75rem; display: block; }
    .status-msg { color: #888; font-size: 0.9rem; margin-top: 0.75rem; display: block; }
  </style>
</head>
<body>

  <!-- SCREEN 1: LANDING -->
  <div class="screen active" id="screen-landing">
    <h1>PM design interview bot</h1>
    <p class="sub">Practice product design questions. Get nudges. Compare with model answers.</p>
    <button id="start-btn" onclick="goToPractice()">Start session &rarr;</button>
    <span class="error-msg" id="start-error" style="display:none;"></span>
  </div>

  <!-- SCREEN 2: PRACTICE -->
  <div class="screen" id="screen-practice">
    <h1>Your question</h1>
    <p class="sub" id="session-meta">Session &mdash; loading...</p>

    <div class="question-box loading" id="question-text">Generating your question...</div>

    <label for="user-notes">Your thinking (rough notes are fine)</label>
    <textarea id="user-notes" style="min-height:160px;" placeholder="Start with: who is the user? what problem are we solving? what would you build?"></textarea>

    <div class="nudge-output" id="nudge-output"></div>

    <button class="secondary" id="nudge-btn" onclick="getNudge()">Get nudge</button>
    <button id="done-btn" onclick="goToDebrief()">I'm done &rarr;</button>
  </div>

  <!-- SCREEN 3: DEBRIEF -->
  <div class="screen" id="screen-debrief">
    <h1>Debrief</h1>
    <p class="sub">Compare your thinking with the model answer.</p>

    <div class="two-col">
      <div>
        <p class="col-label">YOUR NOTES</p>
        <div class="notes-box" id="your-notes-display"></div>
      </div>
      <div>
        <p class="col-label">MODEL ANSWER</p>
        <div class="answer-box" id="model-answer-box">Loading model answer...</div>
      </div>
    </div>

    <label for="reflection">What did you miss or want to remember?</label>
    <textarea id="reflection" style="min-height:80px;" placeholder="e.g. forgot to define success metrics, didn't think about edge cases..."></textarea>

    <button id="submit-btn" onclick="submitDebrief()">Submit debrief &rarr;</button>
    <button class="secondary" onclick="goToLanding()" style="margin-left:8px;">New question</button>
    <span id="debrief-status"></span>
  </div>

  <script>

    // --- CONFIG (only value to change when self-hosting) ---
    const CONFIG = {
      questionWebhook: 'http://gaurav-n8n.duckdns.org:5678/webhook/pm-interview-question',
      debriefWebhook: 'http://gaurav-n8n.duckdns.org:5678/webhook/pm-interview-debrief'
    };

    // Session state
    let sessionType = 'product_design';
    let currentQuestion = '';
    let modelAnswer = '';

    // --- NAVIGATION ---
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function goToLanding() {
      // Reset session state
      document.getElementById('user-notes').value = '';
      document.getElementById('reflection').value = '';
      document.getElementById('nudge-output').style.display = 'none';
      document.getElementById('nudge-output').textContent = '';
      document.getElementById('question-text').textContent = 'Generating your question...';
      document.getElementById('question-text').classList.add('loading');
      document.getElementById('debrief-status').textContent = '';
      currentQuestion = '';
      modelAnswer = '';
      showScreen('screen-landing');
    }

    // --- QUESTION GENERATOR ---
    async function goToPractice() {
      const errorEl = document.getElementById('start-error');
      const btn = document.getElementById('start-btn');

      btn.disabled = true;
      btn.textContent = 'Loading...';
      errorEl.style.display = 'none';

      document.getElementById('session-meta').textContent =
        'Session — ' + new Date().toISOString().split('T')[0];

      showScreen('screen-practice');

      try {
        const response = await fetch(CONFIG.questionWebhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: sessionType })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || 'Could not generate question. Try again.');
        }

        currentQuestion = data.question;
        const qBox = document.getElementById('question-text');
        qBox.textContent = currentQuestion;
        qBox.classList.remove('loading');

      } catch (err) {
        showScreen('screen-landing');
        errorEl.textContent = 'Error: ' + err.message;
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Start session \u2192';
      }
    }

    // --- DEBRIEF: get model answer then show screen ---
    async function goToDebrief() {
      const notes = document.getElementById('user-notes').value.trim();
      if (!notes) { alert('Add some notes before moving on.'); return; }

      const btn = document.getElementById('done-btn');
      btn.disabled = true;
      btn.textContent = 'Loading model answer...';

      try {
        const response = await fetch(CONFIG.questionWebhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: sessionType, mode: 'model_answer', question: currentQuestion })
        });

        const data = await response.json();
        modelAnswer = data.model_answer || data.question || 'Could not load model answer.';

      } catch (err) {
        modelAnswer = 'Could not load model answer. You can still submit your debrief.';
      } finally {
        btn.disabled = false;
        btn.textContent = "I'm done \u2192";
      }

      document.getElementById('your-notes-display').textContent =
        document.getElementById('user-notes').value;
      document.getElementById('model-answer-box').textContent = modelAnswer;
      showScreen('screen-debrief');
    }

    // --- NUDGE ---
    async function getNudge() {
      const notes = document.getElementById('user-notes').value.trim();
      if (!notes) { alert('Add some notes first, then ask for a nudge.'); return; }

      const btn = document.getElementById('nudge-btn');
      btn.disabled = true;
      btn.textContent = 'Getting nudge...';

      try {
        const response = await fetch(CONFIG.questionWebhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: sessionType, mode: 'nudge', question: currentQuestion, notes })
        });

        const data = await response.json();
        const nudgeEl = document.getElementById('nudge-output');
        nudgeEl.textContent = data.nudge || 'Could not load nudge.';
        nudgeEl.style.display = 'block';

      } catch (err) {
        const nudgeEl = document.getElementById('nudge-output');
        nudgeEl.textContent = 'Could not load nudge. Keep going.';
        nudgeEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Get nudge';
      }
    }

    // --- SUBMIT DEBRIEF ---
    async function submitDebrief() {
      const reflection = document.getElementById('reflection').value.trim();
      if (!reflection) { alert('Add your reflection before submitting.'); return; }

      const btn = document.getElementById('submit-btn');
      const statusEl = document.getElementById('debrief-status');
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      statusEl.textContent = '';
      statusEl.className = 'status-msg';

      try {
        const response = await fetch(CONFIG.debriefWebhook, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: sessionType,
            question: currentQuestion,
            model_answer: modelAnswer,
            your_notes: document.getElementById('user-notes').value,
            reflection: reflection
          })
        });

        const data = await response.json();

        if (!response.ok || data.error) {
          throw new Error(data.error || 'Submission failed.');
        }

        statusEl.textContent = 'Debrief saved. Check your email.';
        statusEl.className = 'success-msg';
        btn.textContent = 'Submitted';

      } catch (err) {
        statusEl.textContent = 'Could not save debrief (' + err.message + '). Your notes are still here.';
        statusEl.className = 'error-msg';
        btn.disabled = false;
        btn.textContent = 'Submit debrief \u2192';
      }
    }

    window.onload = function() {};

  </script>

</body>
</html>
